name: Sales Logger Auto Run

on:
  schedule:
    - cron: '0 13 * * *'  # ทำงานทุกวัน เวลา 20:00 น. (เวลาไทย)
  workflow_dispatch:     # บรรทัดนี้ช่วยให้คุณสามารถกดคลิก Run ด้วยตนเองเพื่อทดสอบได้

jobs:
  log-sales:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-python: '3.10'

      - name: Install dependencies
        run: |
          pip install gspread google-auth requests

      - name: Run Logger Script
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
        run: |
          # ตัวอย่างการส่ง Argument ไปทดสอบรัน (หรือปรับแต่งตามที่ต้องการทดสอบ)
          python sales_logger.py --menu "Daily Cron Report" --qty 1 --price 0